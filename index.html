<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#0a0e16" />
<meta name="description" content="SnakeGame.Az — A modern, polished, neon-themed Snake game built with vanilla HTML, CSS and JavaScript. Plays beautifully on mobile and desktop." />
<title>SnakeGame.Az — Modern Neon Snake</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230a0e16'/%3E%3Ccircle cx='6' cy='12' r='2.2' fill='%2339ff8e'/%3E%3Ccircle cx='10.5' cy='12' r='2.2' fill='%2339e688'/%3E%3Ccircle cx='15' cy='12' r='2.2' fill='%2329cf76'/%3E%3Ccircle cx='19.5' cy='8.5' r='2.4' fill='%23ff5e7a'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="dark">
  <main class="stage">
    <header class="hud">
      <div class="hud-left">
        <span class="badge">
          <span class="badge-key">XAL</span>
          <span class="badge-val mono" id="score">0</span>
        </span>
        <span class="badge">
          <span class="badge-key">REKORD</span>
          <span class="badge-val mono" id="best">0</span>
        </span>
      </div>
      <div class="hud-right">
        <button class="icon-btn" id="btn-theme" type="button" aria-label="Tema dəyiş" title="Tema dəyiş">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-sound" type="button" aria-pressed="true" aria-label="Səs aç/bağla" title="Səs aç/bağla">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" data-on>
            <path d="M3 10v4h4l5 4V6L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 8.05v7.9a4.5 4.5 0 0 0 2.5-3.95zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z" fill="currentColor"/>
          </svg>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" data-off hidden>
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.93 8.93 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" fill="currentColor"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-pause" type="button" aria-label="Fasilə" title="Fasilə">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" data-pause>
            <rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/>
            <rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/>
          </svg>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" data-play hidden>
            <path d="M8 5v14l11-7z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="board-wrap">
      <div class="board-frame">
        <canvas id="board" aria-label="SnakeGame.Az oyun sahəsi"></canvas>
      </div>

      <div class="overlay" id="overlay" data-state="start">
        <div class="overlay-card glass">
          <div class="logo">
            <span class="logo-mark" aria-hidden="true">
              <svg viewBox="0 0 32 32" width="44" height="44">
                <circle cx="6"  cy="16" r="3" fill="#39ff8e"/>
                <circle cx="12" cy="16" r="3" fill="#33e681"/>
                <circle cx="18" cy="16" r="3" fill="#2bc774"/>
                <circle cx="24" cy="11" r="3.2" fill="#22a865"/>
                <circle cx="24" cy="11" r="0.7" fill="#0a0e16"/>
                <circle cx="29" cy="6"  r="2.4" fill="#ff5e7a"/>
              </svg>
            </span>
            <h1 class="logo-text">SnakeGame<span>.Az</span></h1>
          </div>
          <p class="tagline" id="tagline">Müasir, neon dizaynlı Snake oyunu</p>

          <ul class="hints" id="hints">
            <li><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> / <kbd>WASD</kbd> — istiqamət</li>
            <li><kbd>Space</kbd> / <kbd>P</kbd> — fasilə</li>
            <li>Mobil: ekranı çək (swipe) və ya D-pad</li>
          </ul>

          <div class="cta">
            <button class="btn btn-primary" id="btn-primary" type="button">
              <span class="btn-ic" aria-hidden="true">▶</span>
              <span class="btn-lb" id="btn-primary-lb">Oyna</span>
            </button>
          </div>

          <p class="meta" id="meta"></p>
        </div>
      </div>

      <div class="touch-pad" id="touchpad" aria-label="Toxunma idarəetməsi" hidden>
        <button class="dpad up" data-dir="up" aria-label="Yuxarı">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 6l8 10H4z" fill="currentColor"/></svg>
        </button>
        <button class="dpad left" data-dir="left" aria-label="Sol">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 12l10-8v16z" fill="currentColor"/></svg>
        </button>
        <button class="dpad right" data-dir="right" aria-label="Sağ">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M18 12L8 4v16z" fill="currentColor"/></svg>
        </button>
        <button class="dpad down" data-dir="down" aria-label="Aşağı">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 18l-8-10h16z" fill="currentColor"/></svg>
        </button>
      </div>
    </section>

    <footer class="foot">
      <span class="foot-text">SnakeGame.Az · saf HTML/CSS/JS · 2026</span>
    </footer>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
